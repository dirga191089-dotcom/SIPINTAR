<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SI PINTAR — Kantor Imigrasi Medan</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcode-generator/1.4.4/qrcode.min.js"></script>
<style>
  :root{--navy:#0A2342;--navy2:#103A6B;--gold:#C9A24B;--gold-l:#E3C77E;--paper:#F4F2EC;
    --teal:#236E6E;--teal2:#2E8B8B;--ink:#0A2342;--muted:#8A93A0;--muted2:#56657A;--line:rgba(10,35,66,0.07);}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--navy);}
  .wrap{min-height:100vh;width:100%;background:radial-gradient(1100px 600px at 50% -10%,#103A6B 0%,#0A2342 55%,#06182E 100%);display:flex;justify-content:center;align-items:flex-start;}
  .app{width:100%;max-width:480px;min-height:100vh;background:var(--paper);position:relative;box-shadow:0 0 80px rgba(0,0,0,.5);overflow:hidden;}
  .sp-scroll::-webkit-scrollbar{width:0;}
  .sp-tap{transition:transform .12s ease,box-shadow .2s ease,background .2s ease;}
  .sp-tap:active{transform:scale(.97);}
  input,textarea{font-family:'Plus Jakarta Sans',sans-serif;}
  @keyframes spPulse{0%,100%{transform:scale(1);opacity:1;}50%{transform:scale(1.08);opacity:.85;}}
  @keyframes spUp{from{opacity:0;transform:translateY(24px);}to{opacity:1;transform:translateY(0);}}
  @keyframes spOverlay{from{opacity:0;}to{opacity:1;}}
  @keyframes spSheet{from{transform:translateY(100%);}to{transform:translateY(0);}}
  @keyframes spPop{from{opacity:0;transform:scale(.8);}to{opacity:1;transform:scale(1);}}
  @keyframes spSpin{to{transform:rotate(360deg);}}
  @keyframes spGrow{from{width:0;}}

  /* ===== MODERN / TECH ANIMATION LAYER ===== */
  @keyframes gridDrift{from{background-position:0 0,0 0;}to{background-position:36px 36px,36px 36px;}}
  @keyframes orbFloat{0%,100%{transform:translate(0,0) scale(1);}50%{transform:translate(14px,-18px) scale(1.12);}}
  @keyframes scanY{0%{transform:translateY(-40px);opacity:0;}12%{opacity:.7;}88%{opacity:.7;}100%{transform:translateY(240px);opacity:0;}}
  @keyframes sheen{0%{transform:translateX(-130%) skewX(-18deg);}60%,100%{transform:translateX(260%) skewX(-18deg);}}
  @keyframes titleGlow{0%,100%{background-position:0% 50%;}50%{background-position:100% 50%;}}
  @keyframes ringPulse{0%{transform:scale(.85);opacity:.5;}70%{transform:scale(1.25);opacity:0;}100%{opacity:0;}}
  @keyframes floatUp{from{opacity:0;transform:translateY(26px);}to{opacity:1;transform:translateY(0);}}

  /* hero tech grid + glow */
  #hero::before{content:"";position:absolute;inset:0;z-index:0;pointer-events:none;
    background-image:linear-gradient(rgba(201,162,75,.10) 1px,transparent 1px),linear-gradient(90deg,rgba(201,162,75,.10) 1px,transparent 1px);
    background-size:36px 36px;mask-image:radial-gradient(120% 90% at 70% 0%,#000 35%,transparent 75%);
    -webkit-mask-image:radial-gradient(120% 90% at 70% 0%,#000 35%,transparent 75%);
    animation:gridDrift 9s linear infinite;}
  #hero::after{content:"";position:absolute;width:240px;height:240px;left:-60px;bottom:-90px;z-index:0;pointer-events:none;border-radius:50%;
    background:radial-gradient(circle,rgba(30,90,168,.55),transparent 65%);filter:blur(8px);animation:orbFloat 11s ease-in-out infinite;}
  .hero-scan{position:absolute;left:0;right:0;top:0;height:2px;z-index:1;pointer-events:none;
    background:linear-gradient(90deg,transparent,rgba(201,162,75,.9),transparent);box-shadow:0 0 12px rgba(201,162,75,.6);animation:scanY 6s ease-in-out infinite;}

  /* animated gradient hero title */
  .hero-title{background:linear-gradient(100deg,#F6F4EE 0%,#F6F4EE 38%,#E3C77E 50%,#F6F4EE 62%,#F6F4EE 100%);
    background-size:220% auto;-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
    animation:titleGlow 7s ease-in-out infinite;}

  /* logo sheen */
  .logo-sheen{position:relative;overflow:hidden;}
  .logo-sheen::after{content:"";position:absolute;top:0;left:0;width:60%;height:100%;
    background:linear-gradient(90deg,transparent,rgba(255,255,255,.55),transparent);animation:sheen 5.5s ease-in-out infinite;}

  /* live dot ripple */
  .dot-ripple{position:relative;}
  .dot-ripple::after{content:"";position:absolute;inset:-4px;border-radius:50%;border:2px solid rgba(70,179,166,.6);animation:ringPulse 2.4s ease-out infinite;}

  /* scroll reveal */
  .reveal{opacity:0;transform:translateY(26px);transition:opacity .6s cubic-bezier(.16,1,.3,1),transform .6s cubic-bezier(.16,1,.3,1);}
  .reveal.in{opacity:1;transform:none;}

  /* press depth + glow on tappables */
  .sp-tap{will-change:transform;}
  .sp-tap:active{transform:scale(.96);box-shadow:0 0 0 2px rgba(201,162,75,.35),0 6px 18px rgba(10,35,66,.18) !important;}

  /* QR sweep */
  .qr-sweep{position:relative;overflow:hidden;}
  .qr-sweep::before{content:"";position:absolute;top:0;left:0;width:45%;height:100%;z-index:3;pointer-events:none;
    background:linear-gradient(90deg,transparent,rgba(201,162,75,.18),transparent);animation:sheen 6.5s ease-in-out infinite;}

  @media (prefers-reduced-motion: reduce){
    #hero::before,#hero::after,.hero-scan,.hero-title,.logo-sheen::after,.dot-ripple::after,.qr-sweep::before{animation:none !important;}
    .reveal{opacity:1 !important;transform:none !important;transition:none !important;}
  }
  .hidden{display:none !important;}
  .hp{position:absolute !important;left:-9999px !important;width:1px;height:1px;opacity:0;}
  @media print{@page{margin:0;}body{background:#fff !important;}body *{visibility:hidden !important;}
    #sp-qr-print,#sp-qr-print *{visibility:visible !important;}
    #sp-qr-print{position:fixed !important;left:50%;top:60px;transform:translateX(-50%) scale(1.25);transform-origin:top center;box-shadow:none !important;-webkit-print-color-adjust:exact;print-color-adjust:exact;}}
</style>
<style>
  :root{--blue:#1E5AA8;--maxw:1200px;--shadow:0 18px 44px rgba(10,35,66,.10);--shadow-sm:0 2px 10px rgba(10,35,66,.06);}
  html{scroll-behavior:smooth;}
  body{background:var(--paper);color:var(--ink);font-family:'Plus Jakarta Sans',sans-serif;min-height:100vh;}
  a{color:inherit;}
  .dwrap{max-width:var(--maxw);margin:0 auto;padding:0 32px;}
  .deyebrow{display:flex;align-items:center;gap:10px;margin-bottom:16px;}
  .deyebrow span{width:30px;height:2px;background:var(--gold);display:inline-block;}
  .deyebrow h2{margin:0;font-size:13px;font-weight:800;color:var(--navy);letter-spacing:.6px;text-transform:uppercase;}
  .dsec{padding:54px 0;}
  .dmono{font-family:'IBM Plex Mono',monospace;}

  /* ===== NAV ===== */
  .dnav{position:sticky;top:0;z-index:40;background:rgba(10,35,66,.97);backdrop-filter:blur(10px);border-bottom:1px solid rgba(201,162,75,.25);}
  .dnav-inner{max-width:var(--maxw);margin:0 auto;padding:12px 32px;display:flex;align-items:center;gap:18px;}
  .dnav-brand{display:flex;align-items:center;gap:12px;text-decoration:none;flex-shrink:0;}
  .dnav-brand img{width:42px;height:42px;object-fit:contain;}
  .dnav-brand .nm{font-size:18px;font-weight:800;color:#F6F4EE;letter-spacing:-.3px;line-height:1;}
  .dnav-brand .tg{font-size:9.5px;color:var(--gold-l);letter-spacing:.6px;margin-top:3px;}
  .dnav-links{display:flex;align-items:center;gap:4px;margin-left:14px;}
  .dnav-link{font-size:13.5px;font-weight:600;color:rgba(246,244,238,.82);text-decoration:none;padding:8px 12px;border-radius:9px;transition:background .15s,color .15s;}
  .dnav-link:hover{background:rgba(255,255,255,.08);color:#fff;}
  .dnav-right{margin-left:auto;display:flex;align-items:center;gap:10px;}
  .dlang{position:relative;}
  .dlang-btn{display:flex;align-items:center;gap:6px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.18);border-radius:20px;padding:7px 11px;cursor:pointer;}
  .dlang-btn .lc{font-family:'IBM Plex Mono',monospace;font-size:11.5px;font-weight:600;color:var(--gold-l);}
  .dlang-menu{position:absolute;top:46px;right:0;z-index:60;background:#fff;border-radius:12px;box-shadow:0 16px 38px rgba(0,0,0,.3);overflow:hidden;min-width:182px;text-align:left;}
  .dlang-menu>div{padding:11px 15px;font-size:13px;color:var(--navy);cursor:pointer;display:flex;align-items:center;gap:10px;}
  .dlang-menu>div+div{border-top:1px solid rgba(10,35,66,.06);}
  .dlang-menu>div:hover{background:rgba(201,162,75,.10);}
  .dlang-menu .cc{font-family:'IBM Plex Mono',monospace;font-size:10.5px;color:var(--muted);width:20px;}
  .dstatus{display:flex;align-items:center;gap:7px;background:rgba(201,162,75,.16);border:1px solid rgba(201,162,75,.4);border-radius:20px;padding:7px 12px;}
  .dstatus .bdg{font-size:10px;font-weight:600;color:var(--gold-l);font-family:'IBM Plex Mono',monospace;letter-spacing:.4px;}
  .dconsole{display:inline-flex;align-items:center;gap:7px;font-size:12.5px;font-weight:700;color:var(--gold-l);text-decoration:none;background:transparent;border:1px solid rgba(201,162,75,.45);border-radius:10px;padding:8px 13px;cursor:pointer;transition:background .15s;}
  .dconsole:hover{background:rgba(201,162,75,.14);}

  /* ===== HERO ===== */
  .dhero{background:linear-gradient(160deg,#0A2342 0%,#103A6B 100%);position:relative;overflow:hidden;}
  .dhero-inner{max-width:var(--maxw);margin:0 auto;padding:74px 32px 84px;display:grid;grid-template-columns:1.15fr .85fr;gap:56px;align-items:center;position:relative;z-index:2;}
  .dhero-eyebrow{font-family:'IBM Plex Mono',monospace;font-size:13px;letter-spacing:2.5px;color:var(--gold-l);margin-bottom:16px;}
  .dhero h1{margin:0;font-size:50px;font-weight:800;color:#F6F4EE;line-height:1.08;letter-spacing:-1px;}
  .dhero-sub{margin:20px 0 0;font-size:17px;line-height:1.55;color:rgba(246,244,238,.8);max-width:520px;}
  .dhero-office{margin-top:18px;font-weight:800;color:var(--gold-l);font-size:15px;text-shadow:0 1px 6px rgba(201,162,75,.35);}
  .dhero-badges{display:flex;gap:10px;margin-top:24px;flex-wrap:wrap;}
  .dhero-badges span{font-size:12.5px;font-weight:600;color:rgba(246,244,238,.92);background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.16);border-radius:22px;padding:8px 15px;}
  .dhero-cta{display:flex;gap:14px;margin-top:34px;flex-wrap:wrap;}
  .dbtn{display:inline-flex;align-items:center;gap:9px;font-size:15.5px;font-weight:700;border-radius:13px;padding:15px 26px;cursor:pointer;border:none;text-decoration:none;transition:transform .12s,box-shadow .2s;}
  .dbtn:active{transform:scale(.97);}
  .dbtn-gold{background:var(--gold);color:var(--navy);box-shadow:0 10px 26px rgba(201,162,75,.32);}
  .dbtn-gold:hover{box-shadow:0 14px 32px rgba(201,162,75,.42);}
  .dbtn-ghost{background:rgba(255,255,255,.08);color:#F6F4EE;border:1.5px solid rgba(255,255,255,.28);}
  .dbtn-ghost:hover{background:rgba(255,255,255,.14);}

  /* QR gateway card (signature) */
  .dqr-card{justify-self:end;width:100%;max-width:360px;background:rgba(255,255,255,.06);border:1px solid rgba(201,162,75,.4);border-radius:24px;padding:26px;backdrop-filter:blur(4px);box-shadow:0 24px 60px rgba(0,0,0,.35);}
  .dqr-head{display:flex;align-items:center;gap:11px;margin-bottom:18px;}
  .dqr-head img{width:38px;height:38px;object-fit:contain;}
  .dqr-head .t{font-size:14px;font-weight:800;color:#F6F4EE;line-height:1.2;}
  .dqr-head .s{font-size:10.5px;color:var(--gold-l);font-family:'IBM Plex Mono',monospace;letter-spacing:.4px;margin-top:2px;}
  .dqr-frame{background:#fff;border-radius:18px;padding:20px;text-align:center;}
  .dqr-frame img{width:200px;height:200px;display:block;margin:0 auto;}
  .dqr-loading{width:44px;height:44px;border:3px solid #E2E6EC;border-top-color:var(--navy);border-radius:50%;margin:78px auto;animation:spSpin .8s linear infinite;}
  .dqr-scan{margin-top:14px;font-size:11px;font-weight:700;letter-spacing:2px;color:var(--navy);font-family:'IBM Plex Mono',monospace;}
  .dqr-url{margin-top:6px;font-size:11px;color:var(--muted);font-family:'IBM Plex Mono',monospace;word-break:break-all;}
  .dqr-actions{display:flex;gap:10px;margin-top:16px;}
  .dqr-actions button{flex:1;display:flex;align-items:center;justify-content:center;gap:7px;font-size:12.5px;font-weight:700;border-radius:11px;padding:11px;cursor:pointer;border:1px solid rgba(255,255,255,.2);background:rgba(255,255,255,.1);color:#F6F4EE;transition:background .15s;}
  .dqr-actions button:hover{background:rgba(255,255,255,.2);}

  /* ===== PRIMARY SERVICES ===== */
  .dserv{background:var(--paper);}
  .dserv-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:22px;}
  .dserv-card{background:#fff;border:1px solid rgba(10,35,66,.06);border-radius:20px;padding:30px 26px;cursor:pointer;box-shadow:var(--shadow);transition:transform .16s,box-shadow .16s;display:flex;flex-direction:column;gap:6px;text-align:left;}
  .dserv-card:hover{transform:translateY(-4px);box-shadow:0 26px 56px rgba(10,35,66,.16);}
  .dserv-ico{width:56px;height:56px;border-radius:15px;display:flex;align-items:center;justify-content:center;margin-bottom:14px;}
  .dserv-card .ttl{font-size:19px;font-weight:800;color:var(--navy);line-height:1.2;}
  .dserv-card .dsc{font-size:13.5px;color:var(--muted);line-height:1.5;}
  .dserv-card .arr{margin-top:14px;display:inline-flex;align-items:center;gap:7px;font-size:13px;font-weight:700;color:var(--teal);}

  /* ===== QUICK SERVICES ===== */
  .dquick-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;}
  .dquick-card{display:flex;align-items:center;gap:15px;background:#fff;border:1px solid var(--line);border-radius:16px;padding:17px 19px;text-decoration:none;box-shadow:var(--shadow-sm);transition:transform .14s,box-shadow .14s;}
  .dquick-card:hover{transform:translateY(-2px);box-shadow:var(--shadow);}
  .dquick-card .qi{width:46px;height:46px;border-radius:13px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .dquick-card .qt{font-size:15px;font-weight:700;color:var(--navy);}
  .dquick-card .qs{font-size:12.5px;color:var(--muted);}

  /* ===== TWO COLUMN (IKM + KANAL) ===== */
  .dtwo{display:grid;grid-template-columns:1fr 1.15fr;gap:28px;align-items:start;}
  .dikm{background:linear-gradient(160deg,#0A2342,#103A6B);border:1px solid rgba(201,162,75,.4);border-radius:22px;padding:30px;}
  .dikm-top{display:flex;align-items:center;gap:26px;margin-bottom:20px;}
  .dikm-avg{font-size:50px;font-weight:800;color:var(--gold-l);font-family:'IBM Plex Mono',monospace;line-height:1;}
  .dikm-stars{margin-top:8px;font-size:18px;letter-spacing:3px;}
  .dikm-resp{margin-top:7px;}
  .dikm-resp span{font-size:12px;color:rgba(246,244,238,.6);font-family:'IBM Plex Mono',monospace;}
  .dchan-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .dchan{display:flex;align-items:center;gap:13px;background:#fff;border:1px solid var(--line);border-radius:15px;padding:14px 16px;text-decoration:none;box-shadow:var(--shadow-sm);transition:transform .14s,box-shadow .14s;}
  .dchan:hover{transform:translateY(-2px);box-shadow:var(--shadow);}
  .dchan .ci{width:42px;height:42px;border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;color:#fff;}
  .dchan .cn{font-size:14.5px;font-weight:700;color:var(--navy);line-height:1.15;}
  .dchan .ch{font-size:11.5px;color:var(--muted);font-family:'IBM Plex Mono',monospace;}
  .dchan .cb{margin-left:auto;font-size:8.5px;font-weight:800;letter-spacing:.5px;color:#1C7A55;background:#E7F3EE;border-radius:6px;padding:3px 7px;}

  /* ===== FAQ ===== */
  .dfaq-wrap{max-width:880px;margin:0 auto;}
  #faq-list{display:flex;flex-direction:column;gap:11px;}

  /* ===== FOOTER ===== */
  .dfoot{background:var(--navy);color:#F6F4EE;padding:48px 0 40px;margin-top:10px;}
  .dfoot-grid{display:grid;grid-template-columns:1.3fr 1fr 1fr;gap:34px;}
  .dfoot-brand{display:flex;align-items:center;gap:13px;margin-bottom:16px;}
  .dfoot-brand img{width:44px;height:44px;object-fit:contain;}
  .dfoot-brand .nm{font-size:18px;font-weight:800;}
  .dfoot-brand .tg{font-size:10px;color:var(--gold-l);font-family:'IBM Plex Mono',monospace;letter-spacing:.4px;margin-top:3px;}
  .dfoot-row{display:flex;gap:11px;align-items:flex-start;margin-bottom:11px;font-size:13.5px;line-height:1.5;color:rgba(246,244,238,.78);}
  .dfoot h4{font-size:11px;font-weight:800;letter-spacing:.6px;text-transform:uppercase;color:var(--gold-l);margin:0 0 16px;}
  .dfoot-link{display:block;font-size:13.5px;color:rgba(246,244,238,.78);text-decoration:none;padding:5px 0;transition:color .15s;}
  .dfoot-link:hover{color:#fff;}
  .dfoot-bottom{max-width:var(--maxw);margin:30px auto 0;padding:20px 32px 0;border-top:1px solid rgba(201,162,75,.25);display:flex;align-items:center;justify-content:space-between;gap:18px;flex-wrap:wrap;}
  .dfoot-tag{font-size:11px;color:rgba(246,244,238,.45);font-family:'IBM Plex Mono',monospace;line-height:1.7;letter-spacing:.3px;}

  /* entrance (hero) */
  @media (prefers-reduced-motion: no-preference){
    .dhero-left>*{animation:dFade .7s cubic-bezier(.16,1,.3,1) both;}
    .dhero-left>*:nth-child(2){animation-delay:.05s;}
    .dhero-left>*:nth-child(3){animation-delay:.1s;}
    .dhero-left>*:nth-child(4){animation-delay:.15s;}
    .dhero-left>*:nth-child(5){animation-delay:.2s;}
    .dqr-card{animation:dFade .8s .15s cubic-bezier(.16,1,.3,1) both;}
    @keyframes dFade{from{opacity:0;transform:translateY(22px);}to{opacity:1;transform:none;}}
  }

  /* ===== RESPONSIVE ===== */
  @media (max-width:1080px){
    .dhero h1{font-size:42px;}
    .dhero-inner{gap:40px;}
  }
  @media (max-width:920px){
    .dhero-inner{grid-template-columns:1fr;gap:44px;padding:56px 32px 64px;}
    .dqr-card{justify-self:start;max-width:340px;}
    .dtwo{grid-template-columns:1fr;}
    .dserv-grid{grid-template-columns:1fr;}
    .dquick-grid{grid-template-columns:1fr;}
    .dfoot-grid{grid-template-columns:1fr;gap:26px;}
    .dnav-links{display:none;}
  }
  @media (max-width:560px){
    .dwrap,.dnav-inner,.dhero-inner,.dfoot-bottom{padding-left:20px;padding-right:20px;}
    .dhero h1{font-size:34px;}
    .dchan-grid{grid-template-columns:1fr;}
    .dconsole .lbl-full{display:none;}
  }
</style>
<style>
  /* ===== penyatuan mobile/desktop ===== */
  #layout-root{display:block;}
  body[data-layout="mobile"]{background:var(--navy) !important;}
  body[data-layout="desktop"]{background:var(--paper) !important;}
  /* modal: tetap bottom-sheet di HP; jadi dialog tengah di layar lebar */
  @media (min-width:860px){
    #overlay{align-items:center !important; padding:24px !important;}
    #overlay>div{max-width:600px !important; max-height:90vh !important; border-radius:22px !important; animation:spPop .28s cubic-bezier(.16,1,.3,1) !important;}
  }
</style>
<body>
<div id="layout-root"></div>

<!-- MODAL -->
<div id="overlay" class="hidden" onclick="closeModal()" style="position:fixed;inset:0;z-index:50;background:rgba(6,18,34,.6);backdrop-filter:blur(3px);display:flex;justify-content:center;align-items:flex-end;animation:spOverlay .2s ease;">
  <div onclick="event.stopPropagation()" class="sp-scroll" style="width:100%;max-width:480px;max-height:92vh;overflow-y:auto;background:var(--paper);border-radius:24px 24px 0 0;animation:spSheet .32s cubic-bezier(.16,1,.3,1);">
    <div style="position:sticky;top:0;background:var(--paper);padding:16px 22px 12px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--line);z-index:2;">
      <div style="display:flex;align-items:center;gap:10px;"><span style="width:20px;height:2px;background:var(--gold);"></span><span id="modal-title" style="font-size:16px;font-weight:800;color:var(--navy);"></span></div>
      <div onclick="closeModal()" class="sp-tap" style="width:34px;height:34px;border-radius:10px;background:rgba(10,35,66,.06);display:flex;align-items:center;justify-content:center;cursor:pointer;"><svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M6 6l12 12M18 6L6 18" stroke="#0A2342" stroke-width="2" stroke-linecap="round"></path></svg></div>

<script>
/* ===== PEMILIH LAYOUT (mobile vs desktop) — satu DOM, satu layout aktif ===== */
(function(){
  var BP = 860;
  var mountedMode = null;
  function pick(){ return (window.innerWidth >= BP) ? 'desktop' : 'mobile'; }
  function doMount(mode){
    var tpl  = document.getElementById(mode === 'desktop' ? 'tpl-desktop' : 'tpl-mobile');
    var root = document.getElementById('layout-root');
    if(!tpl || !root) return;
    root.innerHTML = tpl.textContent != null ? tpl.textContent : tpl.innerHTML;
    document.body.setAttribute('data-layout', mode);
    mountedMode = mode;
  }
  /* mount awal (boot DOMContentLoaded yang akan mengisi konten) */
  doMount(pick());

  /* rehidrasi layout yang baru di-mount — dipakai HANYA saat swap akibat resize */
  function rehydrate(){
    try{ var L = (typeof LOGO!=='undefined') ? LOGO : window.LOGO;
         ['logo-header','logo-qr','logo-foot'].forEach(function(id){ var im=document.getElementById(id); if(im && L) im.src=L; }); }catch(e){}
    try{ if(typeof applyLang==='function') applyLang(); }catch(e){}
    try{ if(typeof loadIKM==='function')  loadIKM();  }catch(e){}
    try{ if(typeof genQR==='function')    genQR();    }catch(e){}
  }

  /* swap saat melewati breakpoint; jangan ganggu modal/konsol yang sedang terbuka */
  var t;
  function onResize(){
    clearTimeout(t);
    t = setTimeout(function(){
      var want = pick();
      if(want === mountedMode) return;
      var ov  = document.getElementById('overlay');
      var adm = document.getElementById('adm-overlay');
      var modalOpen = ov  && !ov.classList.contains('hidden');
      var adminOpen = adm && adm.style.display && adm.style.display !== 'none';
      if(modalOpen || adminOpen) return;        /* tunda; layout di-swap saat ditutup nanti */
      doMount(want);
      rehydrate();
    }, 200);
  }
  window.addEventListener('resize', onResize);
  window.addEventListener('orientationchange', onResize);
})();
</script>

    faq:[
      ['Apa itu SI PINTAR?','SI PINTAR adalah Sistem Informasi Pelayanan Pengaduan Terintegrasi, Akurat & Responsif — satu gerbang akses ke seluruh kanal resmi, formulir pengaduan/pertanyaan, pelacakan status, dan survei Kantor Imigrasi Medan, kini tersedia dalam 9 bahasa.'],
      ['Bagaimana cara mengajukan pengaduan atau pertanyaan?','Tekan "Pengaduan/Pertanyaan", pilih kategori, isi data, dan jelaskan keperluan Anda. Anda dapat melampirkan 1 foto sebagai bukti. Setelah dikirim Anda menerima nomor tiket; bila mengisi email, konfirmasi otomatis dikirim ke email Anda.'],

      ['Apakah berbayar dan apakah data saya aman?','Akses informasi, pengaduan, dan survei via SI PINTAR gratis; biaya hanya untuk penerbitan dokumen sesuai tarif PNBP resmi. Data Anda hanya digunakan untuk tindak lanjut, dilindungi sesuai UU Pelindungan Data Pribadi, dan tidak dibagikan tanpa dasar hukum.']

  fr:{"hero_title": "Un portail pour<br>tous vos services", "hero_sub": "Système d'information de service et de plaintes intégré, précis et réactif.", "hero_office": "Bureau de l'Immigration de Classe I Spécial TPI Medan", "hero_b1": "⚡ Réponse sous 24 h", "hero_b2": "🏅 Maintien de la zone WBK/WBBM", "tile_complaint": "Plainte/<br>Question/<br>Suggestion", "m_complaint_title": "Déposer une plainte/question", "tile_track": "Suivre le<br>statut", "tile_survey": "Enquête de<br>satisfaction", "qs_title": "Services rapides", "qs_mpaspor": "Demander un passeport (M-Paspor)", "qs_mpaspor_sub": "Télécharger l'app sur Google Play", "qs_loc": "Localisation et itinéraire", "qs_loc_sub": "Ouvrir dans Google Maps", "qs_web": "Site officiel Immigration Medan", "qs_web_sub": "medan.imigrasi.go.id", "ikm_title": "Indice de satisfaction", "ikm_resp": "répondants", "ch_title": "Nos canaux officiels", "ch_sub": "Appuyez pour voir 7 réseaux sociaux", "ch_count": "7 CANAUX", "wa_fastest": "LE PLUS RAPIDE", "ch_email_name": "E-mail officiel", "faq_title": "Centre d'aide", "qr_title": "Partager SI PINTAR", "qr_scan": "SCANNER POUR COMMENCER", "qr_head": "Un scan,<br>tous les services et plaintes", "qr_print": "Imprimer l'affiche", "qr_download": "Télécharger le QR", "ft_office": "Bureau de l'Immigration de Medan", "ft_hours": "Lun–Ven · 08h00–16h00 (WIB)", "ft_tag": "SI PINTAR © 2026 · Intégré, précis et réactif<br>Fiers de servir la nation", "pg_intro": "Soumettez votre plainte, suggestion ou question. L'équipe d'intervention rapide répond sous <strong style=\"color:var(--navy);\">24 heures maximum</strong>.", "lbl_kategori": "Catégorie", "lbl_nama": "Nom complet", "ph_nama": "Saisissez votre nom", "lbl_kontak": "Numéro WhatsApp / E-mail", "ph_kontak": "Obligatoire — pour que nous puissions vous recontacter", "lbl_isi": "Détails de la plainte", "ph_isi": "Décrivez votre besoin ou problème en détail...", "lbl_foto": "Pièce jointe photo (facultatif)", "foto_hint": "Choisir 1 photo · compressée automatiquement", "foto_processing": "⏳ Traitement de la photo, patientez…", "foto_toobig": "⚠️ Photo échouée/trop grande, essayez-en une autre", "err_foto_wait": "La photo est encore en traitement. Attendez le ✓ puis renvoyez.", "consent_text": "J'accepte que mes données soient traitées pour le suivi de la plainte conformément à", "privacy_link": "l'Avis de confidentialité.", "err_required": "Le nom et les détails de la plainte sont obligatoires.", "err_contact": "Saisissez un numéro WhatsApp ou un e-mail valide.", "err_consent": "Veuillez cocher le consentement pour continuer.", "err_throttle": "Veuillez patienter quelques secondes avant de renvoyer.", "btn_submit": "Envoyer la plainte →", "btn_sending": "Envoi…", "secure_note": "🔒 Vos données sont protégées et utilisées uniquement pour le suivi de la plainte.", "succ_title": "Plainte envoyée !", "succ_sub": "Conservez le numéro de ticket suivant comme preuve. L'équipe d'intervention rapide vous contactera via les coordonnées fournies sous 24 heures.", "succ_ticket_label": "VOTRE NUMÉRO DE TICKET", "btn_copy": "Copier le ticket", "btn_copied": "✓ Copié", "btn_done": "Terminé", "lc_intro": "Saisissez votre numéro de ticket pour voir le statut actuel.", "ph_lacak": "MDN-YYMMDD-HHMMSS", "btn_lacak": "Suivre", "lc_loading": "Recherche du ticket…", "lc_notfound_title": "Ticket introuvable", "lc_notfound_sub": "Veuillez vérifier votre numéro de ticket (ex. : MDN-260622-143052).", "lc_received": "Reçue", "lc_processed": "Traitement commencé", "lc_deadline": "Échéance (24 h)", "lc_officer": "Agent", "lc_responded": "Terminée le", "lc_attachment": "Pièce jointe", "lc_view": "Voir", "lc_pending": "En attente", "lc_timeline": "Progression", "lc_reply": "Réponse de l'agent", "lc_reply_q": "Cette réponse répond-elle à votre plainte ?", "lc_btn_accept": "✓ Acceptée", "lc_btn_more": "Besoin d'infos", "lc_thanks_reply": "🙏 Merci pour votre confirmation.", "sv_q": "Êtes-vous satisfait de notre service aujourd'hui ?", "sv_aspect_q": "Qu'est-ce qui vous a le plus marqué ?", "btn_survey": "Envoyer l'évaluation", "sv_thanks_title": "Merci !", "sv_thanks_sub": "Votre évaluation nous aide à améliorer la qualité du service public.", "btn_back": "Retour", "pv_title": "Avis de confidentialité", "pv_body": "Le Bureau de l'Immigration de Classe I Spécial TPI Medan collecte votre nom, vos coordonnées, le contenu de la plainte et les pièces jointes <strong>uniquement pour le suivi</strong> de la plainte ou de la demande d'information.<br><br>Les données ne sont consultées que par les agents autorisés, ne sont pas partagées avec des tiers sans base légale, et sont conservées au maximum <strong>24 mois</strong> avant destruction.<br><br>Vous avez le droit d'accéder à vos données, de les corriger ou d'en demander la suppression conformément à la <strong>loi n° 27 de 2022 sur la protection des données personnelles</strong> en contactant nos canaux officiels.", "office_open": "PLAINTES 24 H", "office_closed": "PLAINTES 24 H", "greet_pagi": "BONJOUR 👋", "greet_siang": "BON APRÈS-MIDI 👋", "greet_sore": "BONSOIR 👋", "greet_malam": "BONSOIR 👋", "kat": ["Passeport", "Visa et permis de séjour", "Plainte contre un étranger", "Contrôle aéroport Kualanamu", "Salon Immigration Deli Park", "ULP Kualanamu", "Installations", "Conduite du personnel", "Autre"], "aspects": ["Aimable et poli", "Rapide", "Info claire", "Accès facile", "Professionnel"], "ratings": ["", "Très insuffisant", "Insuffisant", "Correct", "Satisfait", "Très satisfait"], "status": {"Diterima": "Reçue", "Diproses": "En cours", "Selesai": "Terminée"}, "faq": [["Qu'est-ce que SI PINTAR ?", "SI PINTAR est un système d'information de service et de plaintes intégré, précis et réactif — un portail unique vers tous les canaux officiels, le formulaire plainte/question, le suivi de statut et les enquêtes du Bureau de l'Immigration de Medan, désormais en 9 langues."], ["Comment soumettre une plainte ou une question ?", "Appuyez sur « Plainte/Question », choisissez une catégorie, remplissez vos informations et décrivez votre besoin. Vous pouvez joindre 1 photo comme preuve. Après envoi, vous recevez un numéro de ticket ; si vous indiquez un e-mail, une confirmation est envoyée automatiquement."], ["Comment suivre le statut et répondre à l'agent ?", "Ouvrez « Suivre le statut » et saisissez votre numéro de ticket. Une chronologie s'affiche : Reçue → En cours → Terminée, avec les horaires. Si l'agent répond, vous pouvez appuyer sur « Acceptée » ou « Besoin d'infos », qui ouvre notre WhatsApp officiel."], ["Quelles catégories et services sont disponibles ?", "Catégories : Passeport, Visa et permis de séjour, Plainte contre un étranger, Contrôle aéroport Kualanamu, Salon Immigration Deli Park, ULP Kualanamu, Installations, Conduite du personnel, et Autre. Pour le passeport, utilisez l'application M-Paspor."], ["Est-ce gratuit et mes données sont-elles protégées ?", "L'accès à l'information, aux plaintes et aux enquêtes via SI PINTAR est gratuit ; des frais s'appliquent uniquement à la délivrance de documents selon le tarif officiel (PNBP). Vos données ne servent qu'au suivi, sont protégées par la loi sur la protection des données personnelles et ne sont pas partagées sans base légale."]]},

fnen Sie „Status verfolgen“ und geben Sie Ihre Ticketnummer ein. Eine Zeitleiste erscheint: Eingegangen → In Bearbeitung → Abgeschlossen mit Zeitangaben. Antwortet der Sachbearbeiter, können Sie auf „Akzeptiert“ oder „Mehr Infos nötig“ tippen, was unser offizielles WhatsApp öffnet."],["Welche Kategorien und Dienste gibt es?","Kategorien: Reisepass, Visum & Aufenthalt, Meldung über Ausländer, Kontrolle Flughafen Kualanamu, Immigration Lounge Deli Park, ULP Kualanamu, Einrichtungen, Verhalten des Personals und Sonstiges. Für Reisepassanträge nutzen Sie die M-Paspor-App."],["Ist es kostenlos und sind meine Daten sicher?","Der Zugang zu Informationen, Beschwerden und Umfragen über SI PINTAR ist kostenlos; Gebühren fallen nur für die Dokumentenausstellung gemäß dem offiziellen PNBP-Tarif an. Ihre Daten werden nur zur Bearbeitung verwendet, sind durch das Datenschutzgesetz geschützt und werden ohne Rechtsgrundlage nicht weitergegeben."]]};

function setupReveal(){
  try{
    if (window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;
    var app = document.querySelector('.app'); if(!app) return;
    var kids = Array.prototype.slice.call(app.children);
    var targets = kids.filter(function(elm,i){ return i >= 2 && elm.id !== 'ikm-section'; });
    targets.forEach(function(elm){ elm.classList.add('reveal'); });
    if (!('IntersectionObserver' in window)){ targets.forEach(function(elm){ elm.classList.add('in'); }); return; }
    var io = new IntersectionObserver(function(entries){
      entries.forEach(function(en){ if(en.isIntersecting){ en.target.classList.add('in'); io.unobserve(en.target); } });
    }, { threshold:0.08, rootMargin:'0px 0px -40px 0px' });
    targets.forEach(function(elm){ io.observe(elm); });
  }catch(e){}
}

function handleFoto(input){
  var f=input.files&&input.files[0]; if(!f) return;
  if(!/^image\//.test(f.type)){ el('foto-label').textContent=t('foto_toobig'); el('foto-drop').style.borderColor='#C85A4A'; return; }
  state.fotoPending=true; state.fotoB64=null; state.fotoMime=null;
  el('foto-label').textContent=t('foto_processing'); el('foto-drop').style.borderColor='var(--gold)';
  var fail=function(){ state.fotoPending=false; state.fotoB64=null; el('foto-label').textContent=t('foto_toobig'); el('foto-drop').style.borderColor='#C85A4A'; };
  var rd=new FileReader();
  rd.onerror=fail;
  rd.onload=function(){
    var img=new Image();
    img.onerror=fail;
    img.onload=function(){
      try{
        var max=900,w=img.width,h=img.height;
        if(w>h&&w>max){h=Math.round(h*max/w);w=max;} else if(h>=w&&h>max){w=Math.round(w*max/h);h=max;}
        var c=document.createElement('canvas'); c.width=w; c.height=h;
        c.getContext('2d').drawImage(img,0,0,w,h);
        var q=0.6, durl=c.toDataURL('image/jpeg',q);
        while(durl.length>900000 && q>0.3){ q-=0.1; durl=c.toDataURL('image/jpeg',q); }
        if(durl.length>1100000){ fail(); return; }            // tetap kebesaran -> tolak
        state.fotoB64=durl.split(',')[1]; state.fotoMime='image/jpeg'; state.fotoPending=false;
        el('foto-label').textContent='✓ '+f.name.slice(0,26); el('foto-drop').style.borderColor='var(--teal)';
      }catch(e){ fail(); }
    };
    img.src=rd.result;
  };
  rd.readAsDataURL(f);
}

  if(state.sending) return;
  var nama=el('p-nama').value.trim(), kontak=el('p-kontak').value.trim(), isi=el('p-isi').value.trim();
  if(!nama||!isi){ showErr(t('err_required')); return; }
  if(!validContact(kontak)){ showErr(t('err_contact')); return; }
  if(!el('p-consent').checked){ showErr(t('err_consent')); return; }
  if(state.fotoPending){ showErr(t('err_foto_wait')); return; }
  try{ var last=localStorage.getItem('sp_last_submit'); if(last&&Date.now()-parseInt(last,10)<30000){ showErr(t('err_throttle')); return; } }catch(e){}
  el('p-err').classList.add('hidden');
  state.sending=true; el('p-submit-label').textContent=t('btn_sending'); el('p-submit').style.background='rgba(10,35,66,.25)';

  var tiket=buildTicket();
  var jenis = state.jenis || 'Pengaduan';
  var params={tipe:jenis, jenis:jenis, kategori:T.id.kat[state.kategoriIdx], nama:nama, kontak:kontak, isi:isi, tiket:tiket, consent:'1'};
  if(state.fotoB64){ params.foto=state.fotoB64; params.fotomime=state.fotoMime; }
  var body=new URLSearchParams(params).toString();

  fetch(EXEC_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'application/x-www-form-urlencoded'},body:body}).catch(function(){});
  try{ localStorage.setItem('sp_last_submit', String(Date.now())); }catch(e){}

  setTimeout(function(){
    state.sending=false; state.ticket=tiket;
    el('ticket-num').textContent=tiket; el('copy-label').textContent=t('btn_copy');
    el('view-pengaduan').classList.add('hidden'); el('view-success').classList.remove('hidden');
  }, 700);
}
function copyTicket(){ try{ navigator.clipboard.writeText(state.ticket); }catch(e){} el('copy-label').textContent=t('btn_copied'); }

/* ===== LACAK ===== */
function jsonp(url, cb){
  var name='spcb_'+Date.now()+Math.floor(Math.random()*1000);
  url += (url.indexOf('?')>=0?'&':'?')+'callback='+name;
  var s=document.createElement('script'), done=false;
  window[name]=function(data){ done=true; cb(data); cleanup(); };
  function cleanup(){ try{ delete window[name]; }catch(e){ window[name]=undefined; } if(s.parentNode) s.parentNode.removeChild(s); }
  s.onerror=function(){ if(!done) cb(null); cleanup(); };
  s.src=url; document.body.appendChild(s);
  setTimeout(function(){ if(!done){ cb(null); cleanup(); } }, 12000);
}
function doLacak(){
  var v=el('l-input').value.trim().toUpperCase().replace(/\s+/g,'');
  el('l-result').innerHTML=''; if(!v) return;
  el('l-loading').classList.remove('hidden');
  jsonp(EXEC_URL+'?action=lacak&tiket='+encodeURIComponent(v), function(res){
    el('l-loading').classList.add('hidden');
    if(res&&res.ok) renderFound(res); else renderNotFound();
  });
}
function statusBadge(st){
  var label=(t('status')[st]||st||'').toUpperCase();
  var map={Diterima:['#8A6D1F','rgba(201,162,75,.16)'],Diproses:['#236E6E','rgba(46,139,139,.12)'],Selesai:['#1F7A4D','rgba(31,122,77,.12)']};
  var c=map[st]||['#236E6E','rgba(46,139,139,.12)'];
  return '<span style="font-size:11px;font-weight:700;color:'+c[0]+';background:'+c[1]+';border-radius:8px;padding:4px 10px;">'+label+'</span>';
}
function renderFound(r){
  state.lastLacak = r;
  function row(l,v){ return v?'<div style="display:flex;justify-content:space-between;gap:12px;padding:7px 0;border-bottom:1px solid rgba(10,35,66,.05);"><span style="font-size:12.5px;color:var(--muted);">'+l+'</span><span style="font-size:12.5px;font-weight:600;color:var(--navy);text-align:right;">'+esc(v)+'</span></div>':''; }
  // Linimasa: Diterima -> Diproses -> Selesai
  function step(title, time, done, last){
    var dot = done ? 'background:#2E8B8B;border-color:#2E8B8B;' : 'background:#fff;border-color:#C2CAD4;';
    var inner = done ? '<span style="color:#fff;font-size:11px;line-height:1;">✓</span>' : '';
    var line = last ? '' : '<div style="position:absolute;left:9px;top:20px;bottom:-14px;width:2px;background:'+(done?'#2E8B8B':'rgba(10,35,66,.12)')+';"></div>';
    var titleColor = done ? 'var(--navy)' : 'var(--muted)';
    var timeHtml = time ? '<div style="font-size:12px;color:var(--muted2);font-family:\'IBM Plex Mono\',monospace;margin-top:2px;">'+esc(time)+'</div>'
                        : '<div style="font-size:12px;color:#C2CAD4;margin-top:2px;">'+t('lc_pending')+'…</div>';
    return '<div style="position:relative;padding-left:30px;padding-bottom:14px;">'+line+
      '<div style="position:absolute;left:0;top:0;width:20px;height:20px;border-radius:50%;border:2px solid;display:flex;align-items:center;justify-content:center;'+dot+'">'+inner+'</div>'+
      '<div style="font-size:13.5px;font-weight:700;color:'+titleColor+';line-height:1.1;">'+title+'</div>'+timeHtml+'</div>';
  }
  var timeline =
    step(t('lc_received'),  r.waktu,    !!r.waktu,    false) +
    step(t('lc_processed'), r.diproses, !!r.diproses, false) +
    step(t('lc_responded'), r.dibalas,  !!r.dibalas,  true);

  var att = r.lampiran ? '<div style="display:flex;justify-content:space-between;gap:12px;padding:7px 0;"><span style="font-size:12.5px;color:var(--muted);">'+t('lc_attachment')+'</span><a href="'+esc(r.lampiran)+'" target="_blank" rel="noopener" style="font-size:12.5px;font-weight:700;color:var(--teal);">'+t('lc_view')+' →</a></div>' : '';

  el('l-result').innerHTML =
    '<div style="animation:spUp .35s ease;">'+
      '<div style="background:#fff;border:1px solid rgba(10,35,66,.08);border-radius:16px;padding:18px;margin-bottom:14px;">'+
        '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;"><span style="font-size:12px;font-family:\'IBM Plex Mono\',monospace;color:var(--muted);">'+esc(r.tiket)+'</span>'+statusBadge(r.status)+'</div>'+
        '<div style="font-size:15px;font-weight:700;color:var(--navy);margin-bottom:4px;">'+(esc(r.kategori)||'Pengaduan')+'</div>'+
        (r.isi?'<div style="font-size:13px;color:var(--muted2);line-height:1.45;">'+esc(r.isi)+'</div>':'')+
      '</div>'+
      (r.tanggapan ?
        '<div style="background:linear-gradient(160deg,#0A2342,#103A6B);border:1px solid rgba(201,162,75,.4);border-radius:16px;padding:16px 18px;margin-bottom:14px;">'+
          '<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;">'+
            '<svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M4 5h16v11H8l-4 3V5z" stroke="#E3C77E" stroke-width="1.7" stroke-linejoin="round"></path></svg>'+
            '<span style="font-size:11px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--gold-l);">'+t('lc_reply')+'</span>'+
          '</div>'+
          '<div style="font-size:13.5px;line-height:1.55;color:#F6F4EE;">'+esc(r.tanggapan)+'</div>'+
          '<div style="border-top:1px solid rgba(201,162,75,.25);margin-top:13px;padding-top:13px;">'+
            '<div style="font-size:12px;color:rgba(246,244,238,.75);margin-bottom:9px;">'+t('lc_reply_q')+'</div>'+
            '<div id="reply-actions" style="display:flex;gap:9px;">'+
              '<div onclick="respondAccept()" class="sp-tap" style="flex:1;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);border-radius:11px;padding:11px;text-align:center;cursor:pointer;"><span style="font-size:13px;font-weight:700;color:#F6F4EE;">'+t('lc_btn_accept')+'</span></div>'+
              '<div onclick="respondMoreInfo()" class="sp-tap" style="flex:1.4;background:#25D366;border-radius:11px;padding:11px;text-align:center;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;"><svg width="16" height="16" viewBox="0 0 24 24" fill="#fff"><path d="M12 2a10 10 0 00-8.6 15l-1.3 4.7 4.8-1.3A10 10 0 1012 2z"></path></svg><span style="font-size:13px;font-weight:700;color:#fff;">'+t('lc_btn_more')+'</span></div>'+
            '</div>'+
          '</div>'+
        '</div>' : '')+
      '<div style="background:#fff;border:1px solid rgba(10,35,66,.08);border-radius:16px;padding:18px;">'+
        '<div style="font-size:11px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--gold);margin-bottom:14px;">'+t('lc_timeline')+'</div>'+
        timeline+
        '<div style="border-top:1px solid rgba(10,35,66,.06);margin-top:4px;padding-top:8px;">'+
          row(t('lc_deadline'),r.tenggat)+(r.petugas?row(t('lc_officer'),r.petugas):'')+att+
        '</div>'+
      '</div>'+
    '</div>';
}
function renderNotFound(){
  el('l-result').innerHTML='<div style="text-align:center;padding:24px 0;background:#fff;border-radius:16px;border:1px dashed rgba(200,90,74,.4);"><div style="font-size:34px;margin-bottom:8px;">🔍</div><div style="font-size:14px;font-weight:700;color:#C85A4A;">'+t('lc_notfound_title')+'</div><div style="font-size:12.5px;color:var(--muted);margin-top:4px;">'+t('lc_notfound_sub')+'</div></div>';
}
function respondAccept(){
  var box = el('reply-actions'); if(!box) return;
  box.innerHTML = '<div style="flex:1;text-align:center;font-size:13px;font-weight:600;color:var(--gold-l);padding:6px;">'+t('lc_thanks_reply')+'</div>';
}
function respondMoreInfo(){
  var r = state.lastLacak || {};
  var msg = (LANG==='id')
    ? 'Halo, saya ingin menanyakan informasi tambahan terkait pengaduan saya.\n\n'+
      'Nomor Tiket: '+(r.tiket||'')+'\nKategori: '+(r.kategori||'')+'\n'+
      (r.tanggapan?'Tanggapan petugas: "'+r.tanggapan+'"\n':'')+'\nPertanyaan saya: '
    : 'Hello, I would like to ask for more information about my complaint.\n\n'+
      'Ticket No: '+(r.tiket||'')+'\nCategory: '+(r.kategori||'')+'\n'+
      (r.tanggapan?'Officer response: "'+r.tanggapan+'"\n':'')+'\nMy question: ';
  window.open('https://wa.me/'+WA_NUMBER+'?text='+encodeURIComponent(msg), '_blank');
}

/* ===== SURVEI ===== */
function resetSurvei(){ state.rating=0; state.aspects={}; el('rating-label').textContent=''; }
function buildStars(){
  var box=el('stars'); box.innerHTML='';
  [1,2,3,4,5].forEach(function(n){
    var on=n<=state.rating; var d=document.createElement('div'); d.className='sp-tap'; d.style.cursor='pointer';
    d.innerHTML='<svg width="42" height="42" viewBox="0 0 24 24" fill="'+(on?'#C9A24B':'#E4E1D8')+'"><path d="M12 3l2.6 5.3 5.9.9-4.2 4.1 1 5.8L12 16.6 6.7 19.2l1-5.8L3.5 9.2l5.9-.9L12 3z" stroke="'+(on?'#C9A24B':'#D2CEC2')+'" stroke-width="1.2" stroke-linejoin="round"></path></svg>';
    d.onclick=function(){ state.rating=n; buildStars(); el('rating-label').textContent=t('ratings')[n]||''; el('s-submit').style.background='var(--navy)'; };
    box.appendChild(d);
  });
}
function buildAspects(){
  var box=el('aspect-chips'); box.innerHTML=''; var asp=t('aspects');
  asp.forEach(function(a,idx){
    var on=!!state.aspects[idx]; var chip=document.createElement('div'); chip.className='sp-tap'; chip.textContent=a;
    chip.style.cssText='font-size:13px;font-weight:600;padding:9px 14px;border-radius:11px;cursor:pointer;background:'+(on?'rgba(201,162,75,.16)':'#fff')+';color:'+(on?'#8A6D1F':'#56657A')+';border:1.5px solid '+(on?'#C9A24B':'rgba(10,35,66,.14)')+';';
    chip.onclick=function(){ state.aspects[idx]=!on; buildAspects(); };
    box.appendChild(chip);
  });
}
function submitSurvei(){
  if(state.rating<=0) return;
  var aspek=Object.keys(state.aspects).filter(function(k){return state.aspects[k];}).map(function(k){return T.id.aspects[k];}).join(', ');
  var body=new URLSearchParams({tipe:'Survei', rating:String(state.rating), aspek:aspek}).toString();
  fetch(EXEC_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'application/x-www-form-urlencoded'},body:body}).catch(function(){});
  el('survei-form').classList.add('hidden'); el('survei-done').classList.remove('hidden');
}
</script>

<script type="text/template" id="adm-tpl"><!DOCTYPE html>
<html lang="id">
<head>
