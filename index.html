<title>SI PINTAR — Konsol</title>
<style>
  :root{ --navy:#0A2342; --blue:#103A6B; --gold:#C9A24B; --teal:#236E6E; --bg:#EEF1F5; --card:#fff;
    --muted:#6B7480; --line:#E2E6EC; --ink:#16202E; --red:#C0392B; --green:#1C7A55; --amber:#9A7B2E; --sa:#8E2D3B; }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;background:var(--bg);color:var(--ink);font-size:14px;line-height:1.45}
  .hidden{display:none!important}
  button{font-family:inherit;cursor:pointer;border:none}
  input,textarea,select{font-family:inherit;font-size:14px}
  a{color:var(--blue)}

  /* LOGIN */
  #login{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;background:radial-gradient(1200px 600px at 50% -10%, #16335e 0%, var(--navy) 60%)}
  .login-card{width:100%;max-width:380px;background:var(--card);border-radius:18px;padding:30px 26px;box-shadow:0 24px 60px rgba(0,0,0,.35);text-align:center}
  .badge-logo{width:60px;height:60px;border-radius:14px;background:var(--navy);color:var(--gold);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:22px;margin:0 auto 14px}
  .login-card h1{font-size:18px;margin:0 0 2px;color:var(--navy)}
  .login-card p{margin:0 0 20px;color:var(--muted);font-size:12.5px}
  .pin-input{width:100%;padding:13px 14px;border:1.5px solid var(--line);border-radius:11px;text-align:center;letter-spacing:3px;font-size:18px;font-weight:700;color:var(--navy);outline:none}
  .pin-input:focus{border-color:var(--gold)}
  .btn-primary{width:100%;margin-top:14px;padding:13px;border-radius:11px;background:var(--navy);color:#fff;font-weight:700;font-size:15px;transition:opacity .15s}
  .btn-primary:active{opacity:.85}.btn-primary:disabled{opacity:.55}
  .err{color:var(--red);font-size:12.5px;margin-top:12px;min-height:16px;font-weight:600}
  .login-note{margin-top:18px;font-size:11px;color:var(--muted);line-height:1.5}

  /* TOP */
  .top{position:sticky;top:0;z-index:30;background:var(--navy);color:#fff;display:flex;align-items:center;gap:10px;padding:11px 14px}
  .top .t-logo{width:32px;height:32px;border-radius:8px;background:rgba(255,255,255,.1);color:var(--gold);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px;flex-shrink:0}
  .top .t-title{font-weight:700;font-size:14px;line-height:1.15}
  .top .t-sub{font-size:10.5px;color:#9fb2cc;font-weight:500}
  .sa-pill{background:var(--sa);color:#fff;font-size:9px;font-weight:800;padding:1px 6px;border-radius:5px;letter-spacing:.5px;margin-left:6px;vertical-align:middle}
  .top .spacer{flex:1}
  .iconbtn{background:rgba(255,255,255,.12);color:#fff;border-radius:9px;padding:8px 11px;font-size:12.5px;font-weight:600}
  .iconbtn:active{background:rgba(255,255,255,.22)}
  .tabs{display:flex;background:var(--navy);padding:0 14px}
  .tabs button{background:none;color:#9fb2cc;font-size:13px;font-weight:700;padding:10px 14px;border-bottom:2.5px solid transparent}
  .tabs button.on{color:#fff;border-bottom-color:var(--gold)}

  .wrap{max-width:960px;margin:0 auto;padding:14px}

  /* PETUGAS: stats/filters/list */
  .stats{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:12px}
  .stat{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:10px 8px;text-align:center}
  .stat .n{font-size:20px;font-weight:800;color:var(--navy);line-height:1}
  .stat .l{font-size:10.5px;color:var(--muted);margin-top:4px;font-weight:600}
  .stat.warn .n{color:var(--red)}
  .filters{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-bottom:12px}
  .seg{display:flex;background:var(--card);border:1px solid var(--line);border-radius:10px;overflow:hidden}
  .seg button{padding:8px 12px;font-size:12.5px;font-weight:600;color:var(--muted);background:none;border-right:1px solid var(--line)}
  .seg button:last-child{border-right:none}
  .seg button.on{background:var(--navy);color:#fff}
  .search{flex:1;min-width:160px;padding:9px 12px;border:1px solid var(--line);border-radius:10px;outline:none;background:var(--card)}
  .search:focus{border-color:var(--gold)}
  select.jenis{padding:9px 10px;border:1px solid var(--line);border-radius:10px;background:var(--card);color:var(--ink);outline:none}
  #list{display:flex;flex-direction:column;gap:9px}
  .row{background:var(--card);border:1px solid var(--line);border-radius:13px;padding:12px 13px;cursor:pointer;transition:box-shadow .12s,transform .05s}
  .row:hover{box-shadow:0 6px 18px rgba(10,35,66,.08)}.row:active{transform:scale(.997)}
  .row-top{display:flex;align-items:center;gap:7px;flex-wrap:wrap;margin-bottom:6px}
  .tk{font-family:ui-monospace,Menlo,Consolas,monospace;font-size:11.5px;font-weight:700;color:var(--navy);background:#EEF2F7;padding:2px 7px;border-radius:6px}
  .chip{font-size:10.5px;font-weight:700;padding:2px 8px;border-radius:20px;white-space:nowrap}
  .j-Pengaduan{background:#FDECEC;color:#B23B3B}.j-Pertanyaan{background:#E9F0FB;color:#2C5AA0}.j-Saran{background:#FBF3E0;color:#9A7B2E}
  .st{font-size:10.5px;font-weight:700;padding:2px 9px;border-radius:20px}
  .st-Diterima{background:#EAF0F7;color:#103A6B}.st-Diproses{background:#FBF1E0;color:#9A7B2E}.st-Selesai{background:#E7F3EE;color:#1C7A55}
  .sla{font-size:10.5px;font-weight:700;margin-left:auto}.sla.ok{color:var(--amber)}.sla.late{color:var(--red)}.sla.done{color:var(--green)}
  .row .nm{font-weight:700;color:var(--ink);font-size:13.5px}
  .row .meta{font-size:11.5px;color:var(--muted);margin:1px 0 5px}
  .row .isi{font-size:12.5px;color:#48515e;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .empty{text-align:center;color:var(--muted);padding:50px 20px;font-size:13px}
  /* detail */
  .overlay{position:fixed;inset:0;background:rgba(10,20,40,.5);z-index:40;display:flex;justify-content:center;align-items:flex-end;animation:fade .2s}
  @keyframes fade{from{opacity:0}to{opacity:1}}
  .sheet{background:var(--card);width:100%;max-width:560px;max-height:92vh;overflow-y:auto;border-radius:18px 18px 0 0;animation:up .25s ease}
  @media(min-width:620px){.overlay{align-items:center}.sheet{border-radius:18px}}
  @keyframes up{from{transform:translateY(30px);opacity:.6}to{transform:translateY(0);opacity:1}}
  .sh-head{position:sticky;top:0;background:var(--card);border-bottom:1px solid var(--line);padding:14px 16px;display:flex;align-items:center;gap:9px;flex-wrap:wrap}
  .sh-head .x{margin-left:auto;background:#EEF2F7;border-radius:9px;width:32px;height:32px;font-size:16px;color:var(--muted)}
  .sh-body{padding:16px}
  .kv{display:grid;grid-template-columns:96px 1fr;gap:6px 10px;font-size:13px;margin-bottom:12px}
  .kv .k{color:var(--muted);font-weight:600}.kv .v{color:var(--ink);word-break:break-word}
  .isi-box{background:#F7F9FB;border:1px solid var(--line);border-radius:11px;padding:11px 12px;font-size:13.5px;white-space:pre-wrap;word-break:break-word;margin-bottom:12px}
  .tl{display:flex;gap:6px;margin-bottom:14px}
  .tl .step{flex:1;text-align:center;font-size:10.5px;color:var(--muted);position:relative;padding-top:18px}
  .tl .dot{position:absolute;top:0;left:50%;transform:translateX(-50%);width:13px;height:13px;border-radius:50%;background:var(--line)}
  .tl .step.on .dot{background:var(--teal)}.tl .step.on{color:var(--teal);font-weight:700}
  .tl .step .tm{display:block;color:var(--muted);font-weight:500;margin-top:2px;font-size:9.5px}
  .lbl{font-size:11.5px;font-weight:700;color:var(--navy);margin:12px 0 6px;text-transform:uppercase;letter-spacing:.4px}
  .stbtns{display:flex;gap:7px}
  .stbtns button{flex:1;padding:10px;border-radius:10px;font-weight:700;font-size:12.5px;border:1.5px solid var(--line);background:#fff;color:var(--muted)}
  .stbtns button.sel{border-color:transparent}
  .stbtns button.sel.Diterima{background:#EAF0F7;color:#103A6B}.stbtns button.sel.Diproses{background:#FBF1E0;color:#9A7B2E}.stbtns button.sel.Selesai{background:#E7F3EE;color:#1C7A55}
  .fld{width:100%;padding:11px 12px;border:1.5px solid var(--line);border-radius:11px;outline:none;background:#fff}
  .fld:focus{border-color:var(--gold)}
  textarea.fld{resize:vertical;min-height:84px;line-height:1.5}
  .count{font-size:10.5px;color:var(--muted);text-align:right;margin-top:3px}
  .actions{display:flex;gap:9px;margin-top:16px;position:sticky;bottom:0;background:var(--card);padding-top:6px}
  .btn-save{flex:1;padding:13px;border-radius:11px;background:var(--navy);color:#fff;font-weight:700;font-size:14.5px}
  .btn-save:disabled{opacity:.55}
  .btn-wa{padding:13px 16px;border-radius:11px;background:#25D366;color:#fff;font-weight:700;font-size:13.5px;text-decoration:none;display:flex;align-items:center}
  .btn-wa.off{background:#cfd6de;pointer-events:none}

  /* SUPER: kpi/cards/bars/table */
  .range{font-size:11.5px;color:var(--muted);margin:2px 0 12px}
  .kpis{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin-bottom:14px}
  @media(min-width:640px){.kpis{grid-template-columns:repeat(6,1fr)}}
  .kpi{background:var(--card);border:1px solid var(--line);border-radius:13px;padding:12px 10px}
  .kpi .n{font-size:21px;font-weight:800;color:var(--navy);line-height:1}
  .kpi .l{font-size:10.5px;color:var(--muted);margin-top:5px;font-weight:600}
  .kpi.alert .n{color:var(--red)}.kpi.good .n{color:var(--green)}
  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:15px 16px;margin-bottom:14px}
  .card h3{margin:0 0 12px;font-size:13px;color:var(--navy);font-weight:800;letter-spacing:.2px}
  .grid2{display:grid;grid-template-columns:1fr;gap:14px}
  @media(min-width:720px){.grid2{grid-template-columns:1fr 1fr}}
  .bar{display:flex;align-items:center;gap:10px;margin-bottom:9px;font-size:12.5px}
  .bar .bl{width:110px;flex-shrink:0;color:var(--ink);font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .bar .bt{flex:1;background:#EFF2F6;border-radius:7px;height:16px;overflow:hidden}
  .bar .bf{height:100%;border-radius:7px}
  .bar .bv{width:34px;text-align:right;font-weight:700;color:var(--navy);flex-shrink:0}
  svg{display:block;width:100%;height:auto}
  .legend{font-size:11px;color:var(--muted);margin-top:8px;display:flex;gap:14px}
  .legend i{width:10px;height:10px;border-radius:3px;display:inline-block;margin-right:5px;vertical-align:-1px}
  table{width:100%;border-collapse:collapse;font-size:13px}
  th,td{text-align:left;padding:9px 8px;border-bottom:1px solid var(--line)}
  th{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.4px}
  .stt{font-size:10.5px;font-weight:700;padding:2px 8px;border-radius:20px}
  .stt.ya{background:#E7F3EE;color:var(--green)}.stt.no{background:#FBEAEA;color:var(--red)}
  .rolep{font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px;background:#EFE3E6;color:var(--sa)}
  .mini{font-size:11px;font-weight:700;padding:6px 9px;border-radius:8px;border:1px solid var(--line);background:#fff;color:var(--navy);margin:2px 4px 2px 0}
  /* Kartu petugas (responsif — anti overflow di mobile) */
  .pcard{border:1px solid var(--line);border-radius:12px;padding:12px 13px;margin-bottom:10px;background:var(--card)}
  .pcard-top{display:flex;justify-content:space-between;align-items:center;gap:8px}
  .pcard-name{font-weight:800;font-size:14px;color:var(--ink);word-break:break-word;min-width:0}
  .pcard-meta{font-size:12px;color:var(--muted);margin-top:5px;display:flex;flex-wrap:wrap;gap:6px 10px;align-items:center}
  .pcard-actions{display:flex;flex-wrap:wrap;gap:6px;margin-top:11px}
  .pcard-actions .mini{margin:0}
  .addrow{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
  .addrow input,.addrow select{padding:10px 12px;border:1.5px solid var(--line);border-radius:10px;outline:none}
  .addrow input:focus{border-color:var(--gold)}
  .addrow .btn-add{padding:10px 16px;border-radius:10px;background:var(--navy);color:#fff;font-weight:700}

  .loading{text-align:center;color:var(--muted);padding:40px;font-size:13px}
  .spin{display:inline-block;width:16px;height:16px;border:2.5px solid var(--line);border-top-color:var(--navy);border-radius:50%;animation:sp .7s linear infinite;vertical-align:-3px;margin-right:6px}
  @keyframes sp{to{transform:rotate(360deg)}}
  #toast{position:fixed;left:50%;bottom:22px;transform:translateX(-50%) translateY(20px);z-index:60;opacity:0;background:var(--navy);color:#fff;padding:11px 18px;border-radius:30px;font-size:13px;font-weight:600;box-shadow:0 10px 30px rgba(0,0,0,.3);transition:.25s;pointer-events:none;max-width:90vw;text-align:center}
  #toast.show{opacity:1;transform:translateX(-50%) translateY(0)}#toast.bad{background:var(--red)}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login">
  <div class="login-card">
    <div class="badge-logo">SP</div>
    <h1>Konsol SI PINTAR</h1>
    <p>Kantor Imigrasi Kelas I Khusus TPI Medan</p>
    <input id="nama" class="pin-input" type="text" autocomplete="off" placeholder="Nama petugas" style="letter-spacing:0;text-align:left;font-size:15px;font-weight:600;margin-bottom:10px;" aria-label="Nama petugas">
    <div style="position:relative;margin-bottom:10px;">
      <input id="pin" class="pin-input" type="password" autocomplete="off" placeholder="Password" style="letter-spacing:0;text-align:left;font-size:15px;font-weight:600;margin-bottom:0;padding-right:108px;" aria-label="Password">
      <button type="button" id="pinToggle" onclick="togglePinView()" aria-label="Tampilkan atau sembunyikan password" style="position:absolute;top:50%;right:6px;transform:translateY(-50%);background:transparent;border:1px solid rgba(10,35,66,.18);border-radius:8px;color:#0A2342;font-size:11px;font-weight:700;cursor:pointer;padding:6px 9px;">Lihat</button>
    </div>
    <button id="loginBtn" class="btn-primary">Masuk</button>
    <div id="loginErr" class="err"></div>
    <div class="login-note" style="text-align:left;line-height:1.7;">
      <b style="display:block;margin-bottom:5px;color:#0A2342;font-size:12.5px;">Petunjuk masuk</b>
      1. Masukkan <b>Nama petugas</b> tepat seperti terdaftar.<br>
      2. Masukkan <b>Password</b>, lalu tekan <b>Masuk</b>.<br>
      3. Ketuk <b>Lihat</b> untuk menampilkan password yang sedang Anda ketik.<br>
      <span style="display:block;margin-top:7px;opacity:.75;">Belum punya akses atau lupa password? Hubungi <b>Super Admin</b> untuk membuat akun atau mereset password Anda.</span>
    </div>
  </div>
</div>

<!-- APP -->
<div id="app" class="hidden">
  <div class="top">
    <div class="t-logo">SP</div>
    <div>
      <div class="t-title" id="appTitle">Konsol SI PINTAR</div>
      <div class="t-sub" id="meName"></div>
    </div>
    <div class="spacer"></div>
    <button class="iconbtn" id="refreshBtn">↻</button>
    <button class="iconbtn" id="logoutBtn">Keluar</button>
  </div>
  <div class="tabs hidden" id="tabs">
    <button data-tab="analisa" class="on">📊 Analitik</button>
    <button data-tab="admin">👥 Kelola Admin</button>
  </div>

  <div class="wrap">
    <!-- PETUGAS SHELL -->
    <div id="shell-petugas" class="hidden">
      <div class="stats" id="stats"></div>
      <div class="filters">
        <div class="seg" id="segStatus">
          <button data-s="" class="on">Semua</button>
          <button data-s="Diterima">Diterima</button>
          <button data-s="Diproses">Diproses</button>
          <button data-s="Selesai">Selesai</button>
        </div>
        <select class="jenis" id="fJenis">
          <option value="">Semua jenis</option><option value="Pengaduan">Pengaduan</option><option value="Pertanyaan">Pertanyaan</option><option value="Saran">Saran</option>
        </select>
        <input class="search" id="fSearch" placeholder="Cari tiket, nama, atau isi…">
      </div>
      <div id="list"></div>
    </div>

    <!-- SUPER SHELL -->
    <div id="shell-super" class="hidden">
      <div id="tab-analisa">
        <div class="seg" id="segPeriod">
          <button data-p="harian">Harian</button><button data-p="mingguan">Mingguan</button><button data-p="bulanan" class="on">Bulanan</button><button data-p="tahunan">Tahunan</button>
        </div>
        <div class="range" id="range"></div>
        <div id="analisaBody"><div class="loading"><span class="spin"></span>Memuat analitik…</div></div>
      </div>
      <div id="tab-admin" class="hidden">
        <div class="card">
          <h3>Tambah Petugas Baru</h3>
          <div class="addrow">
            <input id="aNama" placeholder="Nama petugas" style="flex:1;min-width:150px;">
            <input id="aPin" placeholder="Password (≥4)" style="width:140px;">
            <select id="aPeran"><option value="Petugas">Petugas</option><option value="Super Admin">Super Admin</option></select>
            <button class="btn-add" id="addBtn">+ Tambah</button>
          </div>
          <div id="petugasBody"><div class="loading"><span class="spin"></span>Memuat petugas…</div></div>
        </div>
      </div>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
var EXEC_URL='https://script.google.com/macros/s/AKfycbzx55uOX2jGb-38CEBghZr0I53-iUJ9euQnillYEImrTsPsEPX_bhy8auUucwqWhO3Akw/exec';
var TANGGAPAN_MAX=1500;
var state={ token:null, nama:'', peran:'Petugas', rows:[], fStatus:'', fJenis:'', q:'', sel:null, polling:null, period:'bulanan', last:null };
function el(i){return document.getElementById(i);}
function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];});}
function toast(m,bad){var t=el('toast');t.textContent=m;t.className='show'+(bad?' bad':'');setTimeout(function(){t.className='';},2600);}
function jsonp(url){return new Promise(function(res,rej){var cb='__c'+Math.random().toString(36).slice(2);var s=document.createElement('script');var to=setTimeout(function(){cl();rej(new Error('timeout'));},25000);function cl(){clearTimeout(to);try{delete window[cb];}catch(e){window[cb]=undefined;}if(s.parentNode)s.parentNode.removeChild(s);}window[cb]=function(d){cl();res(d);};s.onerror=function(){cl();rej(new Error('net'));};s.src=url+(url.indexOf('?')<0?'?':'&')+'callback='+cb;document.body.appendChild(s);});}
function isSuper(p){return /super/i.test(String(p||''));}
function waNorm(s){var n=String(s||'').replace(/\D/g,'');if(!n)return'';if(n.charAt(0)==='0')return'62'+n.slice(1);if(n.slice(0,2)==='62')return n;if(n.charAt(0)==='8')return'62'+n;return n;}
function isEmail(s){return /^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(String(s||'').trim());}
function waLink(k,t,tg){if(!k||isEmail(k))return'';var n=waNorm(k);if(!n)return'';return 'https://wa.me/'+n+'?text='+encodeURIComponent('Halo, terkait laporan Anda '+t+' di SI PINTAR.'+(tg?' Tanggapan kami: '+tg:''));}

/* AUTH + ROUTING */
function showApp(){el('login').classList.add('hidden');el('app').classList.remove('hidden');}
function showLogin(){el('app').classList.add('hidden');el('login').classList.remove('hidden');el('nama').value='';el('pin').value='';var pt=el('pin');if(pt)pt.type='password';var pb=el('pinToggle');if(pb)pb.textContent='Lihat';el('nama').focus();}
function togglePinView(){var p=el('pin'),b=el('pinToggle');if(!p)return;var show=(p.type==='password');p.type=show?'text':'password';if(b)b.textContent=show?'Sembunyikan':'Lihat';}
function routeByRole(){
  var sup=isSuper(state.peran);
  el('meName').textContent='👤 '+state.nama+(sup?'':'');
  el('appTitle').innerHTML=sup?'Super Admin<span class="sa-pill">SI PINTAR</span>':'Konsol Tim Respon Cepat';
  el('tabs').classList.toggle('hidden',!sup);
  el('shell-super').classList.toggle('hidden',!sup);
  el('shell-petugas').classList.toggle('hidden',sup);
  if(sup){ switchTab('analisa'); }
  else { loadList(true); startPolling(); }
}
function doLogin(){
  var nama=el('nama').value.trim(), pin=el('pin').value;
  if(!nama){el('loginErr').textContent='Masukkan nama petugas.';return;}
  if(!pin){el('loginErr').textContent='Masukkan password.';return;}
  var b=el('loginBtn');b.disabled=true;b.textContent='Memeriksa…';el('loginErr').textContent='';
  jsonp(EXEC_URL+'?action=adminAuth&nama='+encodeURIComponent(nama)+'&pin='+encodeURIComponent(pin)).then(function(d){
    b.disabled=false;b.textContent='Masuk';
    if(d&&d.ok&&d.token){ state.token=d.token; state.nama=d.nama||'Petugas'; state.peran=d.peran||'Petugas';
      try{sessionStorage.setItem('sp_tok',d.token);sessionStorage.setItem('sp_nama',state.nama);sessionStorage.setItem('sp_peran',state.peran);}catch(e){}
      showApp(); routeByRole(); }
    else el('loginErr').textContent=(d&&d.error)?d.error:'Gagal masuk.';
  }).catch(function(){b.disabled=false;b.textContent='Masuk';el('loginErr').textContent='Tidak dapat menghubungi server.';});
}
function logout(){state.token=null;state.peran='Petugas';try{sessionStorage.removeItem('sp_tok');sessionStorage.removeItem('sp_nama');sessionStorage.removeItem('sp_peran');}catch(e){}stopPolling();closeDetail();showLogin();}

/* ===================== PETUGAS ===================== */
function loadList(showLoad){
  if(!state.token)return;
  if(showLoad)el('list').innerHTML='<div class="loading"><span class="spin"></span>Memuat data…</div>';
  jsonp(EXEC_URL+'?action=adminList&tok='+encodeURIComponent(state.token)).then(function(d){
    if(!d||!d.ok){ if(d&&d.error==='auth'){toast('Sesi berakhir, masuk lagi.',true);logout();return;} el('list').innerHTML='<div class="empty">Gagal memuat data.</div>'; return; }
    state.rows=d.rows||[];
    if(d.me){ state.nama=d.me; if(d.peran)state.peran=d.peran; el('meName').textContent='👤 '+state.nama; }
    render();
  }).catch(function(){el('list').innerHTML='<div class="empty">Tidak dapat menghubungi server.</div>';});
}
function slaInfo(r){ if(r.status==='Selesai')return{cls:'done',txt:'✅ Selesai'}; if(r.tenggatTs&&Date.now()>r.tenggatTs)return{cls:'late',txt:'⛔ Terlambat'}; return{cls:'ok',txt:'🟡 Dalam SLA'}; }
function statCard(n,l,cls){return '<div class="stat '+cls+'"><div class="n">'+n+'</div><div class="l">'+l+'</div></div>';}
function render(){
  var s={total:state.rows.length,Diterima:0,Diproses:0,Selesai:0,late:0};
  state.rows.forEach(function(r){if(s[r.status]!==undefined)s[r.status]++;if(r.status!=='Selesai'&&r.tenggatTs&&Date.now()>r.tenggatTs)s.late++;});
  el('stats').innerHTML=statCard(s.total,'Total','')+statCard(s.Diterima,'Diterima','')+statCard(s.Diproses,'Diproses','')+statCard(s.Selesai,'Selesai','')+statCard(s.late,'Terlambat','warn');
  var q=state.q.toLowerCase();
  var rows=state.rows.filter(function(r){ if(state.fStatus&&r.status!==state.fStatus)return false; if(state.fJenis&&r.jenis!==state.fJenis)return false; if(q){var hay=(r.tiket+' '+r.nama+' '+r.isi+' '+r.kontak+' '+r.kategori).toLowerCase();if(hay.indexOf(q)<0)return false;} return true; });
  if(!rows.length){el('list').innerHTML='<div class="empty">Tidak ada laporan yang cocok.</div>';return;}
  el('list').innerHTML=rows.map(function(r){var sla=slaInfo(r);return '<div class="row" data-tk="'+esc(r.tiket)+'"><div class="row-top"><span class="tk">'+esc(r.tiket)+'</span>'+(r.jenis?'<span class="chip j-'+esc(r.jenis)+'">'+esc(r.jenis)+'</span>':'')+'<span class="st st-'+esc(r.status)+'">'+esc(r.status)+'</span><span class="sla '+sla.cls+'">'+sla.txt+'</span></div><div class="nm">'+esc(r.nama||'(tanpa nama)')+'</div><div class="meta">'+esc(r.kategori||'-')+' · '+esc(r.waktu)+(r.petugas?' · 👤 '+esc(r.petugas):'')+'</div><div class="isi">'+esc(r.isi||'-')+'</div></div>';}).join('');
  Array.prototype.forEach.call(el('list').querySelectorAll('.row'),function(node){node.addEventListener('click',function(){openDetail(node.getAttribute('data-tk'));});});
}
function openDetail(tiket){
  var r=null;for(var i=0;i<state.rows.length;i++){if(state.rows[i].tiket===tiket){r=state.rows[i];break;}}
  if(!r)return; state.sel=r;
  var lamp=r.lampiran?'<a href="'+esc(r.lampiran)+'" target="_blank" rel="noopener">Lihat foto bukti ↗</a>':'<span style="color:var(--muted)">—</span>';
  var wl=waLink(r.kontak,r.tiket,r.tanggapan);
  var html='<div class="overlay" id="overlay"><div class="sheet"><div class="sh-head"><span class="tk">'+esc(r.tiket)+'</span>'+(r.jenis?'<span class="chip j-'+esc(r.jenis)+'">'+esc(r.jenis)+'</span>':'')+'<button class="x" id="closeX">✕</button></div><div class="sh-body">'+
    '<div class="kv"><div class="k">Nama</div><div class="v">'+esc(r.nama||'-')+'</div><div class="k">Kontak</div><div class="v">'+esc(r.kontak||'-')+'</div><div class="k">Kategori</div><div class="v">'+esc(r.kategori||'-')+'</div><div class="k">Masuk</div><div class="v">'+esc(r.waktu||'-')+'</div><div class="k">Tenggat</div><div class="v">'+esc(r.tenggat||'-')+'</div><div class="k">Lampiran</div><div class="v">'+lamp+'</div></div>'+
    '<div class="lbl">Isi Laporan</div><div class="isi-box">'+esc(r.isi||'-')+'</div>'+
    '<div class="tl"><div class="step on"><span class="dot"></span>Diterima<span class="tm">'+esc(r.waktu||'')+'</span></div><div class="step '+(r.diproses?'on':'')+'"><span class="dot"></span>Diproses<span class="tm">'+esc(r.diproses||'—')+'</span></div><div class="step '+(r.selesai?'on':'')+'"><span class="dot"></span>Selesai<span class="tm">'+esc(r.selesai||'—')+'</span></div></div>'+
    '<div class="lbl">Ubah Status</div><div class="stbtns" id="stbtns">'+['Diterima','Diproses','Selesai'].map(function(x){return '<button data-st="'+x+'" class="'+(r.status===x?'sel '+x:'')+'">'+x+'</button>';}).join('')+'</div>'+
    '<div class="lbl">Petugas Penindak</div><input class="fld" id="dPetugas" readonly value="'+esc(state.nama||r.petugas||'')+'" style="background:#F2F5F8;color:var(--muted);cursor:not-allowed;"><div class="count" style="text-align:left;color:var(--muted);">Terisi otomatis dari akun Anda'+(r.petugas&&r.petugas!==state.nama?(' · sebelumnya: '+esc(r.petugas)):'')+'</div>'+
    '<div class="lbl">Tanggapan untuk Pemohon</div><textarea class="fld" id="dTanggapan" maxlength="'+TANGGAPAN_MAX+'" placeholder="Tulis jawaban resmi… (tampil di menu Lacak & pesan WA)">'+esc(r.tanggapan||'')+'</textarea><div class="count"><span id="cCount">0</span>/'+TANGGAPAN_MAX+'</div>'+
    '<div class="actions"><button class="btn-save" id="saveBtn">Simpan</button><a class="btn-wa'+(wl?'':' off')+'" id="waBtn" '+(wl?('href="'+esc(wl)+'" target="_blank" rel="noopener"'):'')+'>💬 WA</a></div>'+
    '</div></div></div>';
  var div=document.createElement('div');div.innerHTML=html;document.body.appendChild(div.firstChild);
  state._selStatus=r.status;
  el('closeX').onclick=closeDetail;
  el('overlay').addEventListener('click',function(e){if(e.target.id==='overlay')closeDetail();});
  var tg=el('dTanggapan');el('cCount').textContent=tg.value.length;tg.addEventListener('input',function(){el('cCount').textContent=tg.value.length;});
  Array.prototype.forEach.call(el('stbtns').querySelectorAll('button'),function(bn){bn.addEventListener('click',function(){state._selStatus=bn.getAttribute('data-st');Array.prototype.forEach.call(el('stbtns').querySelectorAll('button'),function(x){x.className='';});bn.className='sel '+state._selStatus;});});
  el('saveBtn').onclick=saveDetail;
}
function closeDetail(){var o=el('overlay');if(o&&o.parentNode)o.parentNode.removeChild(o);state.sel=null;}
function saveDetail(){
  if(!state.sel)return; var r=state.sel; var status=state._selStatus||r.status; var petugas=state.nama||''; var tanggapan=el('dTanggapan').value.slice(0,TANGGAPAN_MAX);
  var btn=el('saveBtn');btn.disabled=true;btn.textContent='Menyimpan…';
  jsonp(EXEC_URL+'?action=adminUpdate&tok='+encodeURIComponent(state.token)+'&tiket='+encodeURIComponent(r.tiket)+'&status='+encodeURIComponent(status)+'&petugas='+encodeURIComponent(petugas)+'&tanggapan='+encodeURIComponent(tanggapan)).then(function(d){
    btn.disabled=false;btn.textContent='Simpan';
    if(!d||!d.ok){ if(d&&d.error==='auth'){toast('Sesi berakhir, masuk lagi.',true);logout();return;} toast((d&&d.error)?('Gagal: '+d.error):'Gagal menyimpan.',true); return; }
    var lk=d.lookup||{}; r.status=status; r.petugas=(lk.petugas!==undefined?lk.petugas:petugas); r.tanggapan=tanggapan;
    if(lk.diproses!==undefined)r.diproses=lk.diproses; if(lk.dibalas!==undefined)r.selesai=lk.dibalas;
    toast('Tersimpan ✓'); closeDetail(); render();
  }).catch(function(){btn.disabled=false;btn.textContent='Simpan';toast('Tidak dapat menghubungi server.',true);});
}
function startPolling(){stopPolling();state.polling=setInterval(function(){if(!state.sel&&document.visibilityState==='visible'&&!isSuper(state.peran))loadList(false);},60000);}
function stopPolling(){if(state.polling){clearInterval(state.polling);state.polling=null;}}

/* ===================== SUPER ADMIN ===================== */
function loadAnalytics(){
  if(!state.token)return;
  el('analisaBody').innerHTML='<div class="loading"><span class="spin"></span>Memuat analitik…</div>';
  jsonp(EXEC_URL+'?action=analytics&tok='+encodeURIComponent(state.token)+'&period='+state.period).then(function(d){
    if(!d||!d.ok){ if(d&&d.error==='auth'){toast('Sesi berakhir.',true);logout();return;} el('analisaBody').innerHTML='<div class="card">Gagal memuat. '+esc((d&&d.error)||'')+'</div>'; return; }
    state.last=d; renderAnalytics(d);
  }).catch(function(){el('analisaBody').innerHTML='<div class="card">Tidak dapat menghubungi server.</div>';});
}
function kpi(n,l,cls){return '<div class="kpi '+(cls||'')+'"><div class="n">'+n+'</div><div class="l">'+l+'</div></div>';}
function bar(label,val,max,color){var w=max>0?Math.round(val*100/max):0;return '<div class="bar"><div class="bl">'+esc(label)+'</div><div class="bt"><div class="bf" style="width:'+w+'%;background:'+color+';"></div></div><div class="bv">'+val+'</div></div>';}
function trendSVG(series){
  var n=series.length; if(!n)return'';
  var W=Math.max(680,n*52),H=190,padB=26,padT=10,padL=8,padR=8,max=1;
  series.forEach(function(s){if(s.total>max)max=s.total;});
  var bw=(W-padL-padR)/n,innerW=bw*0.56,gap=(bw-innerW)/2,bars='';
  for(var i=0;i<n;i++){var s=series[i],x=padL+i*bw+gap,th=(H-padB-padT)*(s.total/max),sh=(H-padB-padT)*(s.selesai/max),yT=H-padB-th,yS=H-padB-sh;
    bars+='<rect x="'+x.toFixed(1)+'" y="'+yT.toFixed(1)+'" width="'+innerW.toFixed(1)+'" height="'+Math.max(0,th).toFixed(1)+'" rx="3" fill="#C9D3E0"></rect>';
    bars+='<rect x="'+x.toFixed(1)+'" y="'+yS.toFixed(1)+'" width="'+innerW.toFixed(1)+'" height="'+Math.max(0,sh).toFixed(1)+'" rx="3" fill="#236E6E"></rect>';
    if(s.total>0)bars+='<text x="'+(x+innerW/2).toFixed(1)+'" y="'+(yT-3).toFixed(1)+'" text-anchor="middle" font-size="9" fill="#6B7480">'+s.total+'</text>';
    bars+='<text x="'+(x+innerW/2).toFixed(1)+'" y="'+(H-padB+13)+'" text-anchor="middle" font-size="8.5" fill="#6B7480">'+esc(s.label)+'</text>';}
  return '<div style="overflow-x:auto;"><svg viewBox="0 0 '+W+' '+H+'" width="'+W+'"><line x1="'+padL+'" y1="'+(H-padB)+'" x2="'+(W-padR)+'" y2="'+(H-padB)+'" stroke="#E2E6EC"></line>'+bars+'</svg></div><div class="legend"><span><i style="background:#C9D3E0;"></i>Total masuk</span><span><i style="background:#236E6E;"></i>Selesai</span></div>';
}
function renderAnalytics(d){
  el('range').textContent=d.label+' · s.d. '+d.range.to; var T=d.totals;
  el('analisaBody').innerHTML=
    '<div class="kpis">'+kpi(T.total,'Total Laporan')+kpi(T.Selesai,'Selesai','good')+kpi(d.overdueOpen,'Terlambat','alert')+kpi(d.slaPct+'%','SLA Tepat Waktu')+kpi(d.avgRespHours,'Rata-rata Respon (jam)')+kpi(d.survei.avg+' ⭐','Survei ('+d.survei.count+')')+'</div>'+
    '<div class="card"><h3>Tren</h3>'+trendSVG(d.series)+'</div>'+
    '<div class="grid2"><div class="card"><h3>Status</h3>'+bar('Diterima',T.Diterima,T.total,'#103A6B')+bar('Diproses',T.Diproses,T.total,'#C9A24B')+bar('Selesai',T.Selesai,T.total,'#236E6E')+'</div>'+
    '<div class="card"><h3>Jenis Laporan</h3>'+bar('Pengaduan',T.Pengaduan,T.total,'#B23B3B')+bar('Pertanyaan',T.Pertanyaan,T.total,'#2C5AA0')+bar('Saran',T.Saran,T.total,'#9A7B2E')+'</div></div>'+
    '<div class="grid2"><div class="card"><h3>Kategori Teratas</h3>'+(d.kategoriTop.length?d.kategoriTop.map(function(k){return bar(k.k,k.n,d.kategoriTop[0].n,'#103A6B');}).join(''):'<div style="color:var(--muted);font-size:12.5px;">Belum ada data.</div>')+'</div>'+
    '<div class="card"><h3>Distribusi Survei</h3>'+(function(){var m=Math.max.apply(null,d.survei.dist.concat([1])),out='';for(var i=5;i>=1;i--){out+=bar(i+' ⭐',d.survei.dist[i-1],m,(i>=4?'#236E6E':i==3?'#C9A24B':'#B23B3B'));}return out;})()+'<div style="font-size:11.5px;color:var(--muted);margin-top:4px;">Rata-rata '+d.survei.avg+' dari '+d.survei.count+' responden</div></div></div>'+
    '<div class="card"><h3>Petugas Paling Aktif Merespon</h3>'+((d.petugasTop&&d.petugasTop.length)?d.petugasTop.map(function(pt){var mx=d.petugasTop[0].n||1;var w=Math.round(pt.n*100/mx);return '<div style="margin-bottom:11px;"><div style="display:flex;justify-content:space-between;align-items:baseline;font-size:12.5px;margin-bottom:3px;"><b style="color:var(--ink);">'+esc(pt.k)+'</b><span style="color:var(--muted);font-size:11.5px;">'+pt.n+' laporan · ⏱ '+(pt.jam!=null?pt.jam+' jam':'—')+'</span></div><div style="height:8px;background:#EFF2F6;border-radius:6px;overflow:hidden;"><div style="width:'+w+'%;height:100%;background:#236E6E;border-radius:6px;"></div></div></div>';}).join(''):'<div style="color:var(--muted);font-size:12.5px;">Belum ada laporan yang ditangani pada periode ini.</div>')+'<div style="font-size:10.5px;color:var(--muted);margin-top:2px;">Bar = jumlah laporan ditangani · ⏱ = rata-rata waktu respon (laporan selesai)</div></div>';
}
function loadPetugas(){
  el('petugasBody').innerHTML='<div class="loading"><span class="spin"></span>Memuat petugas…</div>';
  jsonp(EXEC_URL+'?action=saListPetugas&tok='+encodeURIComponent(state.token)).then(function(d){
    if(!d||!d.ok){ if(d&&d.error==='auth'){toast('Sesi berakhir.',true);logout();return;} el('petugasBody').innerHTML='Gagal memuat (hanya super admin).'; return; }
    var rows=d.petugas||[]; if(!rows.length){el('petugasBody').innerHTML='<div style="color:var(--muted);">Belum ada petugas.</div>';return;}
    var h='';
    rows.forEach(function(p){var aktif=(String(p.aktif).toLowerCase()!=='tidak'),sup=isSuper(p.peran);
      h+='<div class="pcard">'+
           '<div class="pcard-top"><div class="pcard-name">'+esc(p.nama)+'</div>'+
             '<span class="stt '+(aktif?'ya':'no')+'">'+(aktif?'Aktif':'Nonaktif')+'</span></div>'+
           '<div class="pcard-meta">'+(sup?'<span class="rolep">Super Admin</span>':'<span>Petugas</span>')+
             '<span>🔒 Password tersembunyi</span></div>'+
           '<div class="pcard-actions">'+
             '<button class="mini" onclick="resetPin('+p.row+')">Reset Password</button>'+
             '<button class="mini" onclick="setPeran('+p.row+',\''+(sup?'Petugas':'Super Admin')+'\')">'+(sup?'Jadikan Petugas':'Jadikan Super')+'</button>'+
             '<button class="mini" onclick="togglePet('+p.row+','+(aktif?'false':'true')+')">'+(aktif?'Nonaktifkan':'Aktifkan')+'</button>'+
           '</div>'+
         '</div>';});
    el('petugasBody').innerHTML=h;
  }).catch(function(){el('petugasBody').innerHTML='Tidak dapat menghubungi server.';});
}
function addPetugas(){
  var nama=el('aNama').value.trim(),pin=el('aPin').value.trim(),peran=el('aPeran').value;
  if(nama.length<2){toast('Nama terlalu pendek.',true);return;} if(!/^\S{4,}$/.test(pin)){toast('Password minimal 4 karakter.',true);return;}
  var b=el('addBtn');b.disabled=true;b.textContent='…';
  jsonp(EXEC_URL+'?action=saAddPetugas&tok='+encodeURIComponent(state.token)+'&nama='+encodeURIComponent(nama)+'&pin='+encodeURIComponent(pin)+'&peran='+encodeURIComponent(peran)).then(function(d){
    b.disabled=false;b.textContent='+ Tambah';
    if(!d||!d.ok){toast((d&&d.error)?d.error:'Gagal.',true);return;}
    el('aNama').value='';el('aPin').value='';toast('Petugas ditambahkan ✓');loadPetugas();
  }).catch(function(){b.disabled=false;b.textContent='+ Tambah';toast('Gagal menghubungi server.',true);});
}
function togglePet(row,toActive){ jsonp(EXEC_URL+'?action=saTogglePetugas&tok='+encodeURIComponent(state.token)+'&row='+row+'&aktif='+(toActive?'Ya':'Tidak')).then(function(d){if(d&&d.ok){toast('Diperbarui ✓');loadPetugas();}else toast('Gagal.',true);}).catch(function(){toast('Gagal.',true);}); }
function setPeran(row,peran){ if(!confirm('Ubah peran menjadi "'+peran+'"?'))return; jsonp(EXEC_URL+'?action=saSetPeran&tok='+encodeURIComponent(state.token)+'&row='+row+'&peran='+encodeURIComponent(peran)).then(function(d){if(d&&d.ok){toast('Peran diubah ✓');loadPetugas();}else toast('Gagal.',true);}).catch(function(){toast('Gagal.',true);}); }
function resetPin(row){ var pin=prompt('Password baru (minimal 4 karakter):'); if(pin===null)return; pin=String(pin).trim(); if(!/^\S{4,}$/.test(pin)){toast('Password minimal 4 karakter.',true);return;} jsonp(EXEC_URL+'?action=saResetPin&tok='+encodeURIComponent(state.token)+'&row='+row+'&pin='+encodeURIComponent(pin)).then(function(d){if(d&&d.ok){toast('PIN diganti ✓');loadPetugas();}else toast((d&&d.error)||'Gagal.',true);}).catch(function(){toast('Gagal.',true);}); }
function switchTab(name){
  el('tab-analisa').classList.toggle('hidden',name!=='analisa');
  el('tab-admin').classList.toggle('hidden',name!=='admin');
  Array.prototype.forEach.call(document.querySelectorAll('.tabs button'),function(b){b.classList.toggle('on',b.getAttribute('data-tab')===name);});
  if(name==='admin')loadPetugas(); else loadAnalytics();
}

/* EVENTS */
el('loginBtn').addEventListener('click',doLogin);
el('pin').addEventListener('keydown',function(e){if(e.key==='Enter')doLogin();});
el('nama').addEventListener('keydown',function(e){if(e.key==='Enter')el('pin').focus();});
el('logoutBtn').addEventListener('click',logout);
el('refreshBtn').addEventListener('click',function(){ if(isSuper(state.peran)){ if(!el('tab-admin').classList.contains('hidden'))loadPetugas(); else loadAnalytics(); } else loadList(true); });
el('fSearch').addEventListener('input',function(){state.q=this.value;render();});
el('fJenis').addEventListener('change',function(){state.fJenis=this.value;render();});
el('addBtn').addEventListener('click',addPetugas);
Array.prototype.forEach.call(el('segStatus').querySelectorAll('button'),function(b){b.addEventListener('click',function(){Array.prototype.forEach.call(el('segStatus').querySelectorAll('button'),function(x){x.classList.remove('on');});b.classList.add('on');state.fStatus=b.getAttribute('data-s');render();});});
Array.prototype.forEach.call(document.querySelectorAll('.tabs button'),function(b){b.addEventListener('click',function(){switchTab(b.getAttribute('data-tab'));});});
Array.prototype.forEach.call(el('segPeriod').querySelectorAll('button'),function(b){b.addEventListener('click',function(){Array.prototype.forEach.call(el('segPeriod').querySelectorAll('button'),function(x){x.classList.remove('on');});b.classList.add('on');state.period=b.getAttribute('data-p');loadAnalytics();});});
